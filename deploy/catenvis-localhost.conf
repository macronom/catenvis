# Catenvis - local development vhost under http://localhost/catenvis/
# (or http://127.0.0.1/catenvis/).
#
# Install (manually, locally):
#   sudo cp /path/to/catenvis/deploy/catenvis-localhost.conf /etc/apache2/sites-available/catenvis-localhost.conf
#   sudo a2ensite catenvis-localhost
#   sudo systemctl reload apache2
#
# Requirement: config/config.php has 'base_url' => '/catenvis'.

<VirtualHost *:80>
	ServerName localhost
	ServerAlias 127.0.0.1

	Alias /catenvis /path/to/catenvis/html

	<Directory /path/to/catenvis/html>
		Options -Indexes +FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog  /var/log/apache2/catenvis-error.log
	CustomLog /var/log/apache2/catenvis-access.log combined
	LogLevel  warn
</VirtualHost>
