# Catenvis - Apache configuration for the server (<your-server>).
#
# The app runs as an alias under http://<your-server>/catenvis/ in the
# default vhost; other projects can be served alongside it later.
#
# Install (manually, on the server):
#   sudo cp /var/www/catenvis/deploy/catenvis-server.conf /etc/apache2/conf-available/catenvis.conf
#   sudo a2enconf catenvis
#   sudo systemctl reload apache2
#
# Requirements: mod_rewrite is enabled (sudo a2enmod rewrite) and
# config/config.php has 'base_url' => '/catenvis'.
#
# NOTE: this serves HTTP only. For a public deployment put it behind TLS
# (see "HTTPS" in deploy/SETUP.md); Catenvis enables HSTS and the Secure
# cookie flag automatically once served over HTTPS.

Alias /catenvis /var/www/catenvis/html

<Directory /var/www/catenvis/html>
	Options -Indexes +FollowSymLinks
	AllowOverride All
	Require all granted
</Directory>
